[env:nucleo_l433rc_p]
platform = ststm32
board = nucleo_l433rc_p
framework = arduino
monitor_speed = 115200
lib_deps = 
	northernwidget/DS3231@^1.2.0
	faisalill/BMP390@^1.0.3
	arduino-libraries/SD@^1.3.0
	robtillaart/AM232X@^0.5.2
